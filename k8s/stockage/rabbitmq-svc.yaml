apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-svc
spec:
  type: NodePort
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      nodePort: 30572       # Ton app Node.js utilisera amqp://rabbitmq-svc:5672
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 31672       # Tu pourras ouvrir http://localhost:31672 dans ton navigateur