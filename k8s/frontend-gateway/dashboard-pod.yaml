apiVersion: v1
kind: Pod
metadata:
  name: dashboard-vue-pod
  labels:
    app: dashboard
spec:
  containers:
  - name: vue-app
    image: meteo/meteo-dashboard:v1
    imagePullPolicy: Never
    ports:
    - containerPort: 80
    volumeMounts:
    - name: nginx-conf
      mountPath: /etc/nginx/conf.d/default.conf
      subPath: default.conf
  volumes:
  - name: nginx-conf
    configMap:
      name: dashboard-nginx-conf