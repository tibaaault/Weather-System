apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-nginx-conf
data:
  default.conf: |
    server {
        listen 80;
        
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API pour permettre l'accès direct via le port du Dashboard
        location /api/history {
            proxy_pass http://lecture-svc;
        }

        location /api/data {
            proxy_pass http://ingestion-svc;
        }
    }
