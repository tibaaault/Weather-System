apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-conf
data:
  default.conf: |
    server {
        listen 80;

        location /api/data {
            proxy_pass http://ingestion-svc:3000; 
        }

        location /api/history {
            proxy_pass http://lecture-svc:3001; 
        }
    }