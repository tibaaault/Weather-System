apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-conf
data:
  default.conf: |
    server {
        listen 80;

        # Dashboard web application
        location / {
            proxy_pass http://dashboard-svc;
        }

        # Data ingestion API
        location /api/data {
            proxy_pass http://ingestion-svc; 
        }

        # History read API
        location /api/history {
            proxy_pass http://lecture-svc; 
        }
    }